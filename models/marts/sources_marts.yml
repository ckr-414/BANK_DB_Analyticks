# models/marts/schema.yml
version: 2
models:
  - name: mart_customer_360
    description: >
      One row per customer. Risk segment, value tier, cashflow, debt.
      Schema={{ var('marts_schema') }}. enter_dt propagated end-to-end.
    columns:
      - name: customer_id
        tests: [unique, not_null]
      - name: value_tier
        tests:
          - accepted_values:
              values: ['PLATINUM','GOLD','SILVER','STANDARD']
      - name: risk_segment
        tests:
          - accepted_values:
              values: ['HIGH_RISK','LEVERAGED','MODERATE_RISK','LOW_RISK']
      - name: enter_dt
        tests: [not_null]
      - name: enter_by
        tests: [not_null]
      - name: update_dt
        tests:
          - not_null
          - dbt_utils.expression_is_true: { expression: ">= enter_dt" }
      - name: update_by
        tests: [not_null]
      - name: dag_id
        tests: [not_null]

  - name: mart_loan_portfolio_health
    columns:
      - name: loan_type
        tests: [unique, not_null]
      - name: default_rate_pct
        tests:
          - dbt_utils.expression_is_true: { expression: "BETWEEN 0 AND 100" }
      - name: enter_dt
        tests: [not_null]
      - name: dag_id
        tests: [not_null]

  - name: int_loan_payments_incremental
    description: >
      enter_dt preserved from first insert (excluded from merge_update_columns).
      update_dt changes when payment is corrected via MERGE.
    columns:
      - name: payment_id
        tests: [unique, not_null]
      - name: enter_dt
        tests: [not_null]
      - name: update_dt
        tests:
          - not_null
          - dbt_utils.expression_is_true: { expression: ">= enter_dt" }
      - name: dag_id
        tests: [not_null]
